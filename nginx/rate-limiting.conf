# Include this file inside the http{} block in /etc/nginx/nginx.conf
# Example: include /etc/nginx/rate-limiting.conf;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
# Batch-upload friendly zone for /api/files. File uploads are cheap I/O and
# already bounded by per-tier backend limits + storage quota; using api_limit
# (60r/m) throttled legitimate multi-file batches.
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=300r/m;
