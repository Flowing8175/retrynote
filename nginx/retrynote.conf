# IMPORTANT: Include nginx/rate-limiting.conf in /etc/nginx/nginx.conf http block
# Example: include /etc/nginx/rate-limiting.conf;

server {
    server_name retrynote.cloud www.retrynote.cloud;

    # H-003 fix: define security headers as variables so they can be reused without inheritance issues
    # L-001: hide nginx version
    server_tokens off;

    # H-003 fix: root-level security headers will be inherited by /api/ (no add_header there)
    # For / and static assets which DO have add_header, we include all headers explicitly in each block.

    # Harden static hosting: never expose dotfiles or package manager manifests even if they land in dist.
    location ~ /\.(?!well-known(?:/|$)) {
        return 404;
    }

    location ~* ^/(?:package(?:-lock)?\.json|npm-shrinkwrap\.json|yarn\.lock|pnpm-lock\.yaml)$ {
        return 404;
    }

    location / {
        root /home/retrynote/frontend/dist;
        try_files $uri $uri/ /index.html;

        # H-003: repeat all security headers here (child block overrides parent)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com https://static.cloudflareinsights.com https://cdn.paddle.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://cdn.jsdelivr.net https://fonts.gstatic.com; connect-src 'self' https://retrynote.cloud https://static.cloudflareinsights.com https://*.paddle.com; frame-src https://challenges.cloudflare.com https://buy.paddle.com https://sandbox-buy.paddle.com https://checkout.paddle.com https://sandbox-checkout.paddle.com; frame-ancestors 'none';" always;
        add_header Cache-Control "no-cache" always;
    }

    location /api/ {
        client_max_body_size 105M;
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # H-004: use $scheme not client header
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # M-001: rate limit API — burst allows short spikes, nodelay serves them immediately
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
    }

    location /api/auth/ {
        client_max_body_size 1M;
        proxy_pass http://127.0.0.1:8001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # M-001: stricter rate limit on auth endpoints
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
    }

    # .mjs needed for pdfjs-dist worker (ES module)
    location ~* \.(js|mjs|css|png|jpg|ico|svg|woff2)$ {
        root /home/retrynote/frontend/dist;
        expires 7d;

        # H-003: repeat all security headers here too
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com https://static.cloudflareinsights.com https://cdn.paddle.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://cdn.jsdelivr.net https://fonts.gstatic.com; connect-src 'self' https://retrynote.cloud https://static.cloudflareinsights.com https://*.paddle.com; frame-src https://challenges.cloudflare.com https://buy.paddle.com https://sandbox-buy.paddle.com https://checkout.paddle.com https://sandbox-checkout.paddle.com; frame-ancestors 'none';" always;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/retrynote.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/retrynote.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.retrynote.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = retrynote.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name retrynote.cloud www.retrynote.cloud;

    listen 80;
    return 404; # managed by Certbot




}
