server {
    server_name retrynote.cloud www.retrynote.cloud;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        root /home/retrynote/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location /api/ {
        client_max_body_size 5M;
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        root /home/retrynote/frontend/dist;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/retrynote.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/retrynote.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.retrynote.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = retrynote.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name retrynote.cloud www.retrynote.cloud;

    listen 80;
    return 404; # managed by Certbot
}
