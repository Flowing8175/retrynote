version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
      POSTGRES_DB: quizmanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://quiz:quiz@db:5432/quizmanager
      - DATABASE_URL_SYNC=postgresql://quiz:quiz@db:5432/quizmanager
      - REDIS_URL=redis://redis:6379/0
      # Add other required env vars here or via .env file
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage

  worker:
    build:
      context: ./backend
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://quiz:quiz@db:5432/quizmanager
      - DATABASE_URL_SYNC=postgresql://quiz:quiz@db:5432/quizmanager
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
