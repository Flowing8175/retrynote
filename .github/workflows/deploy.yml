name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'nginx/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── 2. 프론트엔드 빌드 ───────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL=https://retrynote.cloud/api VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }} npm run build

      # ── 3. SSH 설정 ───────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # ── 4. nginx 설정 배포 ──────────────────────────────────
      - name: Deploy nginx config
        run: |
          scp -i ~/.ssh/deploy_key nginx/retrynote.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/retrynote.nginx.conf
          scp -i ~/.ssh/deploy_key nginx/rate-limiting.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/rate-limiting.conf
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo cp /tmp/retrynote.nginx.conf /etc/nginx/sites-enabled/retrynote && \
             sudo cp /tmp/rate-limiting.conf /etc/nginx/rate-limiting.conf && \
             grep -q 'rate-limiting.conf' /etc/nginx/nginx.conf || \
               sudo sed -i 's|http {|http {\n\tinclude /etc/nginx/rate-limiting.conf;|' /etc/nginx/nginx.conf && \
             sudo nginx -t"

      # ── 5. 프론트엔드 전송 ───────────────────────────────────
      - name: Deploy frontend
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo rm -rf /home/retrynote/frontend/dist/* && sudo mkdir -p /home/retrynote/frontend/dist"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --rsync-path="sudo rsync" \
            frontend/dist/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/retrynote/frontend/dist/
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo chown -R retrynote:retrynote /home/retrynote/frontend/dist"

      # ── 6. 백엔드 배포 ───────────────────────────────────────
      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -e
            APP_DIR=/home/retrynote/app

            # 최신 코드
            sudo -u retrynote git -C $APP_DIR fetch origin
            sudo -u retrynote git -C $APP_DIR reset --hard origin/main

            # Python 의존성 업데이트
            sudo chown -R retrynote:retrynote $APP_DIR/backend/.venv || true
            cd $APP_DIR/backend && sudo -u retrynote /home/retrynote/.local/bin/uv sync --no-dev

            # 마이그레이션
            cd $APP_DIR/backend
            DB_URL=$(sudo grep "^DATABASE_URL=" $APP_DIR/.env | cut -d= -f2-)
            sudo -u retrynote env PYTHONPATH=$APP_DIR/backend APP_ENV=development DATABASE_URL="$DB_URL" \
              $APP_DIR/backend/.venv/bin/alembic upgrade head

            # 서비스 재시작
            sudo systemctl restart retrynote-api retrynote-worker

            # 헬스 체크 (8 uvicorn workers 콜드스타트 + AI SDK import 포함, 보수적으로 60초 대기)
            RETRIES=30
            until curl -sf --max-time 5 http://127.0.0.1:8001/health > /dev/null 2>&1; do
              RETRIES=$((RETRIES - 1))
              [ "$RETRIES" -eq 0 ] && echo "API 시작 실패" && exit 1
              sleep 2
            done

            # nginx 리로드
            sudo systemctl reload nginx
          ENDSSH
