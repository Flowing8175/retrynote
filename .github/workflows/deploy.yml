name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # ghcr.io push 권한

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Docker 빌드 준비 ───────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. 백엔드 이미지 빌드 & Push ─────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/flowing8175/quiz-manager-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 4. 프론트엔드 빌드 ───────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --silent
          VITE_API_URL=https://retrynote.cloud/api npm run build

      # ── 5. SSH 설정 ───────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H DEPLOY_HOST_PLACEHOLDER >> ~/.ssh/known_hosts

      # ── 6. 프론트엔드 전송 ───────────────────────────────────
      - name: Deploy frontend
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@DEPLOY_HOST_PLACEHOLDER \
            "sudo rm -rf /home/retrynote/frontend/dist/* && sudo mkdir -p /home/retrynote/frontend/dist"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --rsync-path="sudo rsync" \
            frontend/dist/ ubuntu@DEPLOY_HOST_PLACEHOLDER:/home/retrynote/frontend/dist/
          ssh -i ~/.ssh/deploy_key ubuntu@DEPLOY_HOST_PLACEHOLDER \
            "sudo chown -R retrynote:retrynote /home/retrynote/frontend/dist"

      # ── 7. 백엔드 배포 ───────────────────────────────────────
      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@DEPLOY_HOST_PLACEHOLDER << 'ENDSSH'
            set -e
            APP_DIR=/home/retrynote/app

            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u flowing8175 --password-stdin

            # 최신 코드 + 이미지 pull
            sudo -u retrynote git -C $APP_DIR fetch origin
            sudo -u retrynote git -C $APP_DIR reset --hard origin/main
            sudo docker compose -f $APP_DIR/docker-compose.yml pull api worker

            # 컨테이너 교체 (db, redis는 건드리지 않음)
            sudo docker compose -f $APP_DIR/docker-compose.yml up -d --no-deps --no-build api worker

            # DB 준비 대기
            RETRIES=20
            until sudo docker compose -f $APP_DIR/docker-compose.yml exec -T db pg_isready -U quiz -d quizmanager > /dev/null 2>&1; do
              RETRIES=$((RETRIES - 1))
              [ "$RETRIES" -eq 0 ] && echo "DB 타임아웃" && exit 1
              sleep 3
            done

            # 마이그레이션
            sudo docker compose -f $APP_DIR/docker-compose.yml exec -T -w /app api alembic upgrade head

            # nginx 리로드
            sudo systemctl reload nginx
          ENDSSH
