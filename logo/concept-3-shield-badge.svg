<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="red3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="50%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="red3light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#dd2222"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#ff000044"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg3)"/>
  <!-- Rounded badge/shield shape -->
  <rect x="116" y="80" width="280" height="300" rx="40" fill="url(#red3)" filter="url(#shadow3)"/>
  <!-- Inner highlight -->
  <rect x="126" y="88" width="260" height="284" rx="34" fill="none" stroke="#ff555533" stroke-width="2"/>
  <!-- Bold white N inside -->
  <g transform="translate(256, 230)">
    <line x1="-70" y1="90" x2="-70" y2="-80" stroke="#ffffff" stroke-width="34" stroke-linecap="round"/>
    <line x1="70" y1="-80" x2="70" y2="90" stroke="#ffffff" stroke-width="34" stroke-linecap="round"/>
    <line x1="-70" y1="-80" x2="70" y2="90" stroke="#ffffff" stroke-width="26" stroke-linecap="round"/>
  </g>
  <!-- Retry arrow orbiting the badge -->
  <path d="M380,130 A160,160 0 0,1 380,330" fill="none" stroke="url(#red3light)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <polygon points="384,322 372,340 396,340" fill="#ff5555" opacity="0.7"/>
  <path d="M132,330 A160,160 0 0,1 132,130" fill="none" stroke="url(#red3light)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <polygon points="128,138 116,120 140,120" fill="#ff5555" opacity="0.7"/>
  <!-- Text -->
  <text x="256" y="445" text-anchor="middle" font-family="'SF Pro Display', 'Inter', sans-serif" 
        font-size="36" font-weight="800" fill="#ffffff" letter-spacing="4" opacity="0.9">RETRYNOTE</text>
</svg>
