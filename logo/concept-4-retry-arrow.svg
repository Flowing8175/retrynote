<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="red4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </linearGradient>
    <linearGradient id="orange4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg4)"/>
  <!-- Minimalist N where left stroke curves into a retry arrow at top -->
  <g transform="translate(256, 240)" filter="url(#glow4)">
    <!-- Left stroke rising into a circular retry arrow -->
    <path d="M-90,120 L-90,-20 Q-90,-80 -40,-80 Q10,-80 30,-50 Q50,-20 30,10" 
          fill="none" stroke="url(#orange4)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow tip on the retry curve -->
    <polygon points="38,18 18,0 22,28" fill="#ff8800"/>
    <!-- Right stroke -->
    <line x1="90" y1="-80" x2="90" y2="120" stroke="url(#red4)" stroke-width="32" stroke-linecap="round"/>
    <!-- Diagonal -->
    <line x1="-90" y1="-20" x2="90" y2="120" stroke="url(#red4)" stroke-width="24" stroke-linecap="round" opacity="0.85"/>
    <!-- Small note/document icon at bottom-right -->
    <g transform="translate(70, 85)" opacity="0.6">
      <rect x="0" y="0" width="50" height="60" rx="6" fill="none" stroke="#ff6666" stroke-width="3"/>
      <line x1="10" y1="18" x2="40" y2="18" stroke="#ff6666" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="10" y1="30" x2="35" y2="30" stroke="#ff6666" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="10" y1="42" x2="28" y2="42" stroke="#ff6666" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Folded corner -->
      <path d="M35,0 L50,0 L50,15 Z" fill="#ff666644" stroke="#ff6666" stroke-width="1.5"/>
    </g>
  </g>
  <text x="256" y="442" text-anchor="middle" font-family="'SF Pro Display', 'Inter', sans-serif" 
        font-size="34" font-weight="700" fill="#ffffff" letter-spacing="5" opacity="0.85">RETRYNOTE</text>
</svg>
