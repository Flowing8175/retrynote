<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="red1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#e60000"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg1)"/>
  <!-- Bold N with arched top and retry arrow integrated -->
  <g transform="translate(256, 260)" filter="url(#glow1)">
    <!-- Left vertical stroke -->
    <path d="M-90,110 L-90,-40 Q-90,-100 -40,-100 L0,-100" 
          fill="none" stroke="url(#red1)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arch top connecting to right -->
    <path d="M0,-100 Q50,-100 90,-100 Q140,-100 140,-40" 
          fill="none" stroke="url(#red1)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right vertical stroke (shorter, with arrow) -->
    <path d="M140,-40 L140,110" 
          fill="none" stroke="url(#red1)" stroke-width="38" stroke-linecap="round"/>
    <!-- Diagonal connecting stroke -->
    <path d="M-90,-40 L140,110" 
          fill="none" stroke="url(#red1)" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
    <!-- Retry arrow curving from bottom-right -->
    <path d="M140,110 Q180,130 170,80" 
          fill="none" stroke="#ff6b6b" stroke-width="14" stroke-linecap="round"/>
    <polygon points="175,68 160,85 182,88" fill="#ff6b6b"/>
  </g>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif" 
        font-size="36" font-weight="700" fill="#ffffff" letter-spacing="6" opacity="0.9">RETRYNOTE</text>
</svg>
