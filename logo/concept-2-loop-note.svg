<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg2)"/>
  <!-- N where the diagonal forms a loop/infinity suggesting retry -->
  <g transform="translate(256, 245)" filter="url(#glow2)">
    <!-- Left stroke -->
    <line x1="-100" y1="120" x2="-100" y2="-100" stroke="url(#coral)" stroke-width="36" stroke-linecap="round"/>
    <!-- Right stroke -->
    <line x1="100" y1="-100" x2="100" y2="120" stroke="url(#coral)" stroke-width="36" stroke-linecap="round"/>
    <!-- Diagonal with loop in the center -->
    <path d="M-100,-100 L0,0 Q30,40 60,10 Q90,-20 60,-50 Q30,-80 0,0 L100,120" 
          fill="none" stroke="url(#coral)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="256" y="438" text-anchor="middle" font-family="'SF Pro Display', 'Inter', sans-serif" 
        font-size="34" font-weight="700" fill="#ffffff" letter-spacing="5" opacity="0.85">RETRYNOTE</text>
</svg>
